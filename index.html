<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>KKgram</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 600px;
            height: 100vh;
            background: #f5f5f5;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 40px rgba(0,0,0,0.2);
            position: relative;
        }

        .password-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20;
        }

        .password-box {
            background: white;
            padding: 40px 30px;
            border-radius: 30px;
            text-align: center;
            width: 85%;
            max-width: 320px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .password-box h2 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .password-box p {
            color: #666;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .password-box input {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            margin-bottom: 20px;
            text-align: center;
        }

        .password-box input:focus {
            outline: none;
            border-color: #667eea;
        }

        .password-box button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }

        .error-msg {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 15px;
            display: none;
        }

        .user-select-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 15;
        }

        .user-select-box {
            background: white;
            padding: 40px 30px;
            border-radius: 30px;
            text-align: center;
            width: 85%;
            max-width: 320px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .user-select-box h2 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 26px;
        }

        .user-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }

        .user-btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 20px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }

        .user-btn.katya {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .user-btn.kirill {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }

        .chat-screen {
            display: none;
            flex-direction: column;
            height: 100%;
        }

        .chat-header {
            background: white;
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #e0e0e0;
        }

        .chat-header h1 {
            font-size: 22px;
            color: #333;
        }

        .current-user-badge {
            background: #f0f0f0;
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-top: 8px;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #f5f5f5;
        }

        .message {
            max-width: 75%;
            padding: 10px 15px;
            border-radius: 20px;
            word-wrap: break-word;
        }

        .message.sent {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 5px;
        }

        .message.received {
            background: white;
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 5px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .message-sender {
            font-size: 11px;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .message.sent .message-sender {
            text-align: right;
            color: rgba(255,255,255,0.8);
        }

        .message.received .message-sender {
            color: #667eea;
        }

        .message-time {
            font-size: 10px;
            margin-top: 5px;
            opacity: 0.7;
        }

        .message.sent .message-time {
            text-align: right;
        }

        .input-area {
            background: white;
            padding: 15px 20px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #e0e0e0;
        }

        .input-area input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 16px;
        }

        .input-area input:focus {
            outline: none;
            border-color: #667eea;
        }

        .input-area button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 25px;
            font-size: 20px;
            cursor: pointer;
        }

        .loading {
            text-align: center;
            color: #999;
            padding: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="password-screen" id="passwordScreen">
            <div class="password-box">
                <h2>🔒 KKgram</h2>
                <p>Введите пароль, чтобы продолжить</p>
                <input type="password" id="passwordInput" placeholder="Пароль" autocomplete="off">
                <button onclick="checkPassword()">Войти</button>
                <div class="error-msg" id="errorMsg">Неверный пароль</div>
            </div>
        </div>

        <div class="user-select-screen" id="userSelectScreen" style="display: none;">
            <div class="user-select-box">
                <h2>✨ Кто ты?</h2>
                <p>Выбери, от чьего имени будешь писать</p>
                <div class="user-buttons">
                    <button class="user-btn katya" onclick="selectUser('Катя')">🌸 Катя</button>
                    <button class="user-btn kirill" onclick="selectUser('Кирилл')">💙 Кирилл</button>
                </div>
            </div>
        </div>

        <div class="chat-screen" id="chatScreen">
            <div class="chat-header">
                <h1>❤️ KKgram ❤️</h1>
                <p>Только для нас двоих</p>
                <div class="current-user-badge" id="currentUserBadge"></div>
            </div>
            <div class="messages-area" id="messagesArea">
                <div class="loading">Загрузка сообщений...</div>
            </div>
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Напиши что-то..." autocomplete="off">
                <button onclick="sendMessage()">📤</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyC3wZh5S5lcFaj43cLpKp8_dGNRixssASg",
            authDomain: "chat-2525a.firebaseapp.com",
            projectId: "chat-2525a",
            storageBucket: "chat-2525a.firebasestorage.app",
            messagingSenderId: "522782029051",
            appId: "1:522782029051:web:a8dadabbae6e78024e2c5e"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        
        // 🔧 ИЗМЕНИ ЭТИ ДАННЫЕ (создай пользователя в Firebase Authentication)
        const EMAIL = "chat@kkgram.com";  // ← Твой email из Firebase Auth
        const PASSWORD = "passwordforkkgram";  // ← Твой пароль из Firebase Auth
        
        // 🔐 СЕКРЕТНЫЙ ПАРОЛЬ ДЛЯ ВХОДА В ЧАТ (придумайте вместе)
        const CHAT_PASSWORD = "1702";  // ← Этот пароль будут вводить Катя и Кирилл
        
        let currentUser = null;
        
        async function loginToFirebase() {
            try {
                await signInWithEmailAndPassword(auth, EMAIL, PASSWORD);
                console.log("✅ Успешный вход в Firebase");
                return true;
            } catch (error) {
                console.error("❌ Ошибка входа:", error);
                if (error.code === 'auth/user-not-found') {
                    alert(`Пользователь не найден!\n\nСоздай его в Firebase Console:\n1. Authentication → Users\n2. Add user\n3. Email: ${EMAIL}\n4. Password: ${PASSWORD}`);
                } else if (error.code === 'auth/wrong-password') {
                    alert("Неверный пароль Firebase. Проверь PASSWORD в коде.");
                } else if (error.code === 'auth/invalid-email') {
                    alert("Неверный формат email. Используй email вида: name@example.com");
                }
                return false;
            }
        }
        
        window.checkPassword = async function() {
            const input = document.getElementById('passwordInput').value;
            const errorMsg = document.getElementById('errorMsg');
            
            if (input === CHAT_PASSWORD) {
                const loggedIn = await loginToFirebase();
                if (loggedIn) {
                    document.getElementById('passwordScreen').style.display = 'none';
                    document.getElementById('userSelectScreen').style.display = 'flex';
                } else {
                    errorMsg.textContent = 'Ошибка подключения к серверу';
                    errorMsg.style.display = 'block';
                    setTimeout(() => {
                        errorMsg.style.display = 'none';
                    }, 2000);
                }
            } else {
                errorMsg.textContent = 'Неверный пароль!';
                errorMsg.style.display = 'block';
                setTimeout(() => {
                    errorMsg.style.display = 'none';
                }, 2000);
            }
        };
        
        window.selectUser = function(userName) {
            currentUser = userName;
            document.getElementById('userSelectScreen').style.display = 'none';
            document.getElementById('chatScreen').style.display = 'flex';
            document.getElementById('currentUserBadge').innerHTML = `Ты говоришь как ${userName}`;
            loadMessages();
        };
        
        window.sendMessage = async function() {
            if (!currentUser) {
                alert("Сначала выбери, кто ты");
                return;
            }
            
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            
            if (text === '') return;
            
            try {
                await addDoc(collection(db, 'messages'), {
                    text: text,
                    sender: currentUser,
                    timestamp: serverTimestamp(),
                });
                input.value = '';
                const messagesArea = document.getElementById('messagesArea');
                setTimeout(() => {
                    messagesArea.scrollTop = messagesArea.scrollHeight;
                }, 100);
            } catch (error) {
                console.error('Ошибка:', error);
                alert('Не удалось отправить сообщение. Проверь правила Firestore!');
            }
        };
        
        function formatDateTime(timestamp) {
            if (!timestamp) return '';
            const date = timestamp.toDate();
            const now = new Date();
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const msgDate = new Date(date.getFullYear(), date.getMonth(), date.getDate());
            
            const timeStr = `${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`;
            
            if (msgDate.getTime() === today.getTime()) {
                return `Сегодня в ${timeStr}`;
            }
            const yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);
            if (msgDate.getTime() === yesterday.getTime()) {
                return `Вчера в ${timeStr}`;
            }
            const days = ['янв', 'фев', 'мар', 'апр', 'мая', 'июн', 'июл', 'авг', 'сен', 'окт', 'ноя', 'дек'];
            return `${date.getDate()} ${days[date.getMonth()]} ${date.getFullYear()} в ${timeStr}`;
        }
        
        function loadMessages() {
            const q = query(collection(db, 'messages'), orderBy('timestamp', 'asc'));
            
            onSnapshot(q, (snapshot) => {
                const messagesArea = document.getElementById('messagesArea');
                messagesArea.innerHTML = '';
                
                if (snapshot.empty) {
                    messagesArea.innerHTML = '<div class="loading">Напишите первое сообщение ❤️</div>';
                    return;
                }
                
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const text = data.text;
                    const sender = data.sender || 'Кто-то';
                    const timestamp = data.timestamp;
                    
                    const isCurrentUser = (sender === currentUser);
                    const messageDiv = document.createElement('div');
                    messageDiv.className = `message ${isCurrentUser ? 'sent' : 'received'}`;
                    
                    const timeStr = formatDateTime(timestamp);
                    
                    messageDiv.innerHTML = `
                        <div class="message-sender">${sender === 'Катя' ? '🌸 Катя' : '💙 Кирилл'}</div>
                        <div>${escapeHtml(text)}</div>
                        <div class="message-time">${timeStr}</div>
                    `;
                    messagesArea.appendChild(messageDiv);
                });
                
                messagesArea.scrollTop = messagesArea.scrollHeight;
            }, (error) => {
                console.error('Ошибка:', error);
                if (error.code === 'permission-denied') {
                    document.getElementById('messagesArea').innerHTML = '<div class="loading">❌ Ошибка доступа! Проверь правила Firestore Database (нужен request.auth != null)</div>';
                } else {
                    document.getElementById('messagesArea').innerHTML = '<div class="loading">❌ Ошибка подключения к Firebase</div>';
                }
            });
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            const input = document.getElementById('messageInput');
            if (input) {
                input.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        sendMessage();
                    }
                });
            }
        });
        
        onAuthStateChanged(auth, (user) => {
            if (user) {
                console.log("✅ Авторизован:", user.email);
            } else {
                console.log("❌ Не авторизован");
            }
        });
    </script>
</body>
</html>
